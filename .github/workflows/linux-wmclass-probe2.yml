name: Linux WMClass Probe2

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to probe'
        required: true
        default: 'v1.0.10'

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb x11-utils xdotool libgtk-3-0 libnotify4 libnss3 \
            libxss1 libxtst6 xdg-utils libatspi2.0-0 libsecret-1-0 libgbm1 libasound2 \
            libdrm2 libxcomposite1 libxdamage1 libxrandr2 libxkbcommon0 libpango-1.0-0 \
            libcairo2 libcups2 libxfixes3 fuse libfuse2 metacity || true

      - name: Download AppImage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.event.inputs.tag }}" -R ${{ github.repository }} --pattern "*x86_64.AppImage" --dir .
          chmod +x *.AppImage
          ./*.AppImage --appimage-extract >/dev/null 2>&1

      - name: Launch with a real WM and read WM_CLASS
        run: |
          BIN=$(find squashfs-root -maxdepth 1 -type f -name 'lyra-desktop' | head -1)
          echo "BIN=$BIN"
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x800x24 &
          sleep 3
          metacity --replace --sm-disable >/tmp/wm.log 2>&1 &
          sleep 2
          export HOME=/home/runner ELECTRON_ENABLE_LOGGING=1
          "$BIN" --no-sandbox --disable-gpu >/tmp/app.log 2>&1 &
          for i in $(seq 1 12); do
            sleep 5
            WIDS=$(xdotool search --all --name "" 2>/dev/null)
            if [ -n "$WIDS" ]; then
              echo "===== tick $i: windows found ====="
              for wid in $WIDS; do
                CLS=$(xprop -id "$wid" WM_CLASS 2>/dev/null)
                NM=$(xprop -id "$wid" WM_NAME 2>/dev/null)
                [ -n "$CLS" ] && echo "  wid=$wid $CLS | $NM"
              done
              # stop once we see a non-WM window with a class
              if xdotool search --all --name "" 2>/dev/null | while read w; do xprop -id "$w" WM_CLASS 2>/dev/null; done | grep -qiE 'lyra'; then
                echo ">>> found a lyra-classed window at tick $i"; break
              fi
            else
              echo "tick $i: no windows yet"
            fi
          done
          echo "===== FINAL: all windows WM_CLASS ====="
          for wid in $(xdotool search --all --name "" 2>/dev/null); do
            xprop -id "$wid" WM_CLASS WM_NAME 2>/dev/null | tr '\n' ' '; echo
          done
          echo "===== app log tail ====="
          tail -12 /tmp/app.log
