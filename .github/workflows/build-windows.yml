name: Build Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure git to use HTTPS instead of SSH
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Download build zip
        run: |
          gh release download appx-build --pattern "appx-build.zip" --dir .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract build
        run: Expand-Archive -Path appx-build.zip -DestinationPath electron-app

      - name: Remove macOS-only deps and the core/ postinstall trampoline
        working-directory: electron-app
        # The postinstall script lives in the parent monorepo (StreamingCore-Client)
        # which isn't checked out here. Strip the postinstall — we'll rebuild
        # natives explicitly via electron-builder install-app-deps below.
        run: |
          npm pkg delete devDependencies.dmg-license
          npm pkg delete dependencies.dmg-license
          npm pkg delete optionalDependencies.dmg-license
          npm pkg delete scripts.postinstall

      - name: Install dependencies
        working-directory: electron-app
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Rebuild native modules for Electron on win32-x64
        working-directory: electron-app
        # electron-builder install-app-deps reads the Electron version and
        # platform/arch and runs node-gyp rebuild for every native dep. This
        # is what makes register-scheme produce a real .node Windows PE.
        run: npx electron-builder install-app-deps --platform=win32 --arch=x64

      - name: Verify register-scheme .node is a Windows PE
        working-directory: electron-app
        run: |
          $node = "node_modules\register-scheme\build\Release\register-protocol-handler.node"
          if (!(Test-Path $node)) { Write-Error "register-scheme .node not built"; exit 1 }
          $bytes = [System.IO.File]::ReadAllBytes($node)[0..1]
          if ($bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
            Write-Error "register-scheme .node is not a Windows PE (MZ magic missing). Got: $($bytes[0]),$($bytes[1])"
            exit 1
          }
          Write-Host "✓ register-scheme .node is a Windows PE"

      - name: Build Windows targets (nsis + zip + appx)
        working-directory: electron-app
        run: npx electron-builder@26.0.0 --win nsis zip appx --x64 --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lyra-music-windows
          path: |
            electron-app/dist/*.exe
            electron-app/dist/*.exe.blockmap
            electron-app/dist/*.zip
            electron-app/dist/*.appx
            electron-app/dist/latest.yml

      - name: Cleanup temp release
        if: always()
        run: gh release delete appx-build --repo Lyra-Music-App/Lyra-Desktop-Releases --yes --cleanup-tag 2>$null; exit 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
