name: APPX Screenshot Proof

on:
  workflow_dispatch:

jobs:
  shot:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Configure git HTTPS
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
      - name: Download build zip
        run: gh release download appx-build --pattern "appx-build.zip" --dir .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract build
        run: Expand-Archive -Path appx-build.zip -DestinationPath electron-app
      - name: Strip mac-only deps + postinstall
        working-directory: electron-app
        run: |
          npm pkg delete devDependencies.dmg-license
          npm pkg delete dependencies.dmg-license
          npm pkg delete optionalDependencies.dmg-license
          npm pkg delete scripts.postinstall
      - name: Install dependencies
        working-directory: electron-app
        run: npm install --legacy-peer-deps --ignore-scripts
      - name: Rebuild native modules win32-x64
        working-directory: electron-app
        run: npx electron-builder install-app-deps --platform=win32 --arch=x64
      - name: Build APPX
        working-directory: electron-app
        run: npx electron-builder@26.0.0 --win appx --x64 --publish never
      - name: Sign + install APPX
        working-directory: electron-app
        shell: pwsh
        run: |
          $appx = (Get-ChildItem dist\*.appx | Select-Object -First 1).FullName
          $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=3A309F49-B229-4D77-B1D6-53F794FEB410" `
            -KeyUsage DigitalSignature -CertStoreLocation "Cert:\LocalMachine\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3","2.5.29.19={text}")
          $pw = ConvertTo-SecureString "test1234" -Force -AsPlainText
          Export-PfxCertificate -Cert "Cert:\LocalMachine\My\$($cert.Thumbprint)" -FilePath cert.pfx -Password $pw | Out-Null
          $cer = Export-Certificate -Cert "Cert:\LocalMachine\My\$($cert.Thumbprint)" -FilePath cert.cer
          Import-Certificate -FilePath cert.cer -CertStoreLocation Cert:\LocalMachine\Root | Out-Null
          Import-Certificate -FilePath cert.cer -CertStoreLocation Cert:\LocalMachine\TrustedPeople | Out-Null
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" | Sort-Object FullName | Select-Object -Last 1).FullName
          & $signtool sign /fd SHA256 /a /f cert.pfx /p test1234 $appx
          Add-AppxPackage -Path $appx -ErrorAction Stop
          $pkg = Get-AppxPackage *LyraMusic*
          $manifest = Get-AppxPackageManifest $pkg.PackageFullName
          $appId = $manifest.Package.Applications.Application.Id
          "AUMID=$($pkg.PackageFamilyName)!$appId" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Launch + screenshot the screen
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing
          function Shot($path) {
            $vs = [System.Windows.Forms.SystemInformation]::VirtualScreen
            $bmp = New-Object System.Drawing.Bitmap $vs.Width, $vs.Height
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $g.CopyFromScreen($vs.Location, [System.Drawing.Point]::Empty, $vs.Size)
            $bmp.Save($path, [System.Drawing.Imaging.ImageFormat]::Png)
            $g.Dispose(); $bmp.Dispose()
            Write-Host "saved $path ($($vs.Width)x$($vs.Height))"
          }
          New-Item -ItemType Directory -Force -Path shots | Out-Null
          Write-Host "Launching $env:AUMID"
          Start-Process "shell:AppsFolder\$env:AUMID"
          Start-Sleep -Seconds 12
          Shot "shots\01-loading.png"
          Start-Sleep -Seconds 18
          # bring Lyra window to foreground if possible
          $p = Get-Process "Lyra Music" -ErrorAction SilentlyContinue | Where-Object { $_.MainWindowTitle -ne "" } | Select-Object -First 1
          if ($p) {
            Add-Type @"
using System;using System.Runtime.InteropServices;
public class W{ [DllImport("user32.dll")] public static extern bool SetForegroundWindow(IntPtr h);
[DllImport("user32.dll")] public static extern bool ShowWindow(IntPtr h,int n);}
"@
            [W]::ShowWindow($p.MainWindowHandle, 3) | Out-Null
            [W]::SetForegroundWindow($p.MainWindowHandle) | Out-Null
            Start-Sleep -Seconds 2
            Write-Host "Lyra window title: '$($p.MainWindowTitle)'"
          } else { Write-Host "no Lyra window with title yet" }
          Shot "shots\02-loaded.png"
          $alive = Get-Process "Lyra Music" -ErrorAction SilentlyContinue
          Write-Host (($alive) ? "ALIVE at screenshot time" : "NOT running")
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appx-screenshots
          path: shots
