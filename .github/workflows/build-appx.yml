name: Build APPX

on:
  workflow_dispatch:

jobs:
  build-appx:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git to use HTTPS instead of SSH
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Download build zip
        run: |
          gh release download appx-build --pattern "appx-build.zip" --dir .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract build
        run: Expand-Archive -Path appx-build.zip -DestinationPath electron-app

      - name: Install dependencies
        working-directory: electron-app
        run: yarn install --ignore-optional

      - name: Build APPX
        working-directory: electron-app
        run: npx electron-builder@24.13.3 --win appx --x64 --publish never

      - name: Patch APPX with tile assets
        working-directory: electron-app
        run: |
          $appxFile = Get-ChildItem -Path dist -Filter "*.appx" | Select-Object -First 1
          if ($appxFile) {
            Write-Host "Found APPX: $($appxFile.FullName)"
            
            # Create temp directory
            $tempDir = "dist\_appx_temp"
            New-Item -ItemType Directory -Force -Path $tempDir | Out-Null
            
            # Extract APPX (it's a zip)
            Expand-Archive -Path $appxFile.FullName -DestinationPath $tempDir -Force
            
            # Copy tile assets from buildResources to assets folder
            $assetsDir = "$tempDir\assets"
            $tiles = @("Square44x44Logo.png", "Square71x71Logo.png", "Square150x150Logo.png", "Square310x310Logo.png", "Wide310x150Logo.png", "StoreLogo.png")
            foreach ($tile in $tiles) {
              $src = "buildResources\$tile"
              if (Test-Path $src) {
                Copy-Item $src "$assetsDir\$tile" -Force
                Write-Host "  Copied $tile"
              }
            }
            
            # Patch AppxManifest.xml
            $manifestPath = "$tempDir\AppxManifest.xml"
            $manifest = Get-Content $manifestPath -Raw
            
            # Add Square71x71Logo and Square310x310Logo
            if ($manifest -notmatch "Square71x71Logo") {
              $manifest = $manifest -replace '<uap:DefaultTile Wide310x150Logo="assets\\Wide310x150Logo\.png"\s*/>', '<uap:DefaultTile Wide310x150Logo="assets\Wide310x150Logo.png" Square71x71Logo="assets\Square71x71Logo.png" Square310x310Logo="assets\Square310x310Logo.png" ShortName="Lyra Music" />'
            }
            
            # Fix background color
            $manifest = $manifest -replace 'BackgroundColor="#464646"', 'BackgroundColor="#1a1a2e"'
            
            Set-Content -Path $manifestPath -Value $manifest -Encoding UTF8
            Write-Host "  Patched AppxManifest.xml"
            
            # Remove signature files (re-signing handled by Store)
            Remove-Item "$tempDir\AppxSignature.p7x" -ErrorAction SilentlyContinue
            Remove-Item "$tempDir\AppxBlockMap.xml" -ErrorAction SilentlyContinue
            Remove-Item "$tempDir\[Content_Types].xml" -ErrorAction SilentlyContinue
            
            # Re-pack using MakeAppx
            $sdkPaths = @(
              "${env:ProgramFiles(x86)}\Windows Kits\10\bin\10.0.22621.0\x64\makeappx.exe",
              "${env:ProgramFiles(x86)}\Windows Kits\10\bin\10.0.19041.0\x64\makeappx.exe",
              "${env:ProgramFiles(x86)}\Windows Kits\10\bin\10.0.22000.0\x64\makeappx.exe"
            )
            
            # Also search dynamically
            $makeappx = $null
            $sdkBin = "${env:ProgramFiles(x86)}\Windows Kits\10\bin"
            if (Test-Path $sdkBin) {
              $found = Get-ChildItem -Path $sdkBin -Recurse -Filter "makeappx.exe" | Where-Object { $_.DirectoryName -match "x64" } | Select-Object -First 1
              if ($found) { $makeappx = $found.FullName }
            }
            
            if (-not $makeappx) {
              foreach ($p in $sdkPaths) {
                if (Test-Path $p) { $makeappx = $p; break }
              }
            }
            
            if ($makeappx) {
              Write-Host "Using MakeAppx: $makeappx"
              $newAppx = $appxFile.FullName + ".new"
              & $makeappx pack /d $tempDir /p $newAppx /o
              Remove-Item $appxFile.FullName -Force
              Move-Item $newAppx $appxFile.FullName
              Write-Host "APPX re-packed successfully with tile assets!"
            } else {
              Write-Host "WARNING: MakeAppx not found, using zip fallback"
              Remove-Item $appxFile.FullName -Force
              Compress-Archive -Path "$tempDir\*" -DestinationPath ($appxFile.FullName + ".zip") -Force
              Move-Item ($appxFile.FullName + ".zip") $appxFile.FullName
            }
            
            # Cleanup
            Remove-Item $tempDir -Recurse -Force
          }
        shell: pwsh

      - name: Upload APPX artifact
        uses: actions/upload-artifact@v4
        with:
          name: lyra-music-appx
          path: electron-app/dist/*.appx

      - name: Cleanup temp release
        if: always()
        run: gh release delete appx-build --repo Lyra-Music-App/Lyra-Desktop-Releases --yes --cleanup-tag 2>$null; exit 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
