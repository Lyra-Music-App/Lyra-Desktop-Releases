name: Build APPX

on:
  workflow_dispatch:

jobs:
  build-appx:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git to use HTTPS instead of SSH
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Download build zip
        run: |
          gh release download appx-build --pattern "appx-build.zip" --dir .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract build
        run: Expand-Archive -Path appx-build.zip -DestinationPath electron-app

      - name: Install dependencies
        working-directory: electron-app
        run: yarn install --ignore-optional

      - name: Build APPX
        working-directory: electron-app
        run: npx electron-builder@24.13.3 --win appx --x64 --publish never

      - name: Patch APPX with tile assets
        working-directory: electron-app
        run: |
          $appxFile = Get-ChildItem -Path dist -Filter "*.appx" | Select-Object -First 1
          if (-not $appxFile) { Write-Error "No APPX found!"; exit 1 }
          Write-Host "Found APPX: $($appxFile.FullName)"
          
          $tempDir = "dist\_appx_temp"
          
          # Use 7z to extract
          & 7z x $appxFile.FullName -o"$tempDir" -y
          
          # Fix URL-encoded filenames (7z decodes %20 etc incorrectly)
          Get-ChildItem -Path $tempDir -Recurse -File | Where-Object { $_.Name -match '%[0-9a-fA-F]{2}' } | ForEach-Object {
            $newName = [System.Uri]::UnescapeDataString($_.Name)
            if ($newName -ne $_.Name) {
              $newPath = Join-Path $_.DirectoryName $newName
              Write-Host "  Renaming: $($_.Name) -> $newName"
              Move-Item $_.FullName $newPath
            }
          }
          
          # Also fix directory names
          Get-ChildItem -Path $tempDir -Recurse -Directory | Where-Object { $_.Name -match '%[0-9a-fA-F]{2}' } | ForEach-Object {
            $newName = [System.Uri]::UnescapeDataString($_.Name)
            if ($newName -ne $_.Name) {
              $newPath = Join-Path $_.Parent.FullName $newName
              Write-Host "  Renaming dir: $($_.Name) -> $newName"
              Move-Item $_.FullName $newPath
            }
          }
          
          # Copy tile assets
          $assetsDir = "$tempDir\assets"
          if (-not (Test-Path $assetsDir)) { New-Item -ItemType Directory -Force -Path $assetsDir | Out-Null }
          
          $tiles = @("Square44x44Logo.png", "Square71x71Logo.png", "Square150x150Logo.png", "Square310x310Logo.png", "Wide310x150Logo.png", "StoreLogo.png")
          foreach ($tile in $tiles) {
            $src = "buildResources\$tile"
            if (Test-Path $src) {
              Copy-Item $src "$assetsDir\$tile" -Force
              Write-Host "  Copied $tile"
            }
          }
          
          # Patch manifest
          $manifestPath = "$tempDir\AppxManifest.xml"
          $manifest = Get-Content $manifestPath -Raw
          
          if ($manifest -notmatch "Square71x71Logo") {
            $manifest = $manifest -replace '(<uap:DefaultTile\s+Wide310x150Logo="assets\\Wide310x150Logo\.png")\s*(/>)', '$1 Square71x71Logo="assets\Square71x71Logo.png" Square310x310Logo="assets\Square310x310Logo.png" ShortName="Lyra Music" $2'
          }
          
          $manifest = $manifest -replace 'BackgroundColor="#464646"', 'BackgroundColor="#1a1a2e"'
          Set-Content -Path $manifestPath -Value $manifest -Encoding UTF8 -NoNewline
          Write-Host "  Patched AppxManifest.xml"
          
          # Remove signing artifacts
          Remove-Item "$tempDir\AppxSignature.p7x" -ErrorAction SilentlyContinue
          Remove-Item "$tempDir\AppxBlockMap.xml" -ErrorAction SilentlyContinue
          Remove-Item "$tempDir\[Content_Types].xml" -ErrorAction SilentlyContinue
          
          # Verify exe exists
          $exePath = "$tempDir\app\Lyra Music.exe"
          if (Test-Path $exePath) {
            Write-Host "  Verified: app\Lyra Music.exe exists"
          } else {
            Write-Host "  WARNING: app\Lyra Music.exe NOT found, listing app dir:"
            Get-ChildItem "$tempDir\app" -File | ForEach-Object { Write-Host "    $($_.Name)" }
          }
          
          # Find MakeAppx
          $makeappx = $null
          $sdkBin = "${env:ProgramFiles(x86)}\Windows Kits\10\bin"
          if (Test-Path $sdkBin) {
            $found = Get-ChildItem -Path $sdkBin -Recurse -Filter "makeappx.exe" -ErrorAction SilentlyContinue | Where-Object { $_.DirectoryName -match "x64" } | Select-Object -First 1
            if ($found) { $makeappx = $found.FullName }
          }
          
          if (-not $makeappx) { Write-Error "MakeAppx.exe not found!"; exit 1 }
          Write-Host "Using MakeAppx: $makeappx"
          
          # Re-pack
          Remove-Item $appxFile.FullName -Force
          & $makeappx pack /d $tempDir /p $appxFile.FullName /o
          if ($LASTEXITCODE -ne 0) { Write-Error "MakeAppx failed!"; exit 1 }
          
          Write-Host "APPX re-packed with tile assets!"
          Write-Host "Final APPX size: $([math]::Round((Get-Item $appxFile.FullName).Length / 1MB, 2)) MB"
          
          # Cleanup
          Remove-Item $tempDir -Recurse -Force
        shell: pwsh

      - name: Upload APPX artifact
        uses: actions/upload-artifact@v4
        with:
          name: lyra-music-appx
          path: electron-app/dist/*.appx

      - name: Cleanup temp release
        if: always()
        run: gh release delete appx-build --repo Lyra-Music-App/Lyra-Desktop-Releases --yes --cleanup-tag 2>$null; exit 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
